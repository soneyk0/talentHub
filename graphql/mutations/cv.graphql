mutation CreateCV($cv: CreateCvInput!) {
    createCv(cv: $cv) {
        name
        education
        description
        id
    }
}

mutation DeleteCV($cv: DeleteCvInput!) {
    deleteCv(cv: $cv){
        affected
    }
}

mutation UpdateCV($cv:  UpdateCvInput!) {
    updateCv(cv: $cv) {
        id
        name
        education
        education
    }
}

mutation RemoveCvProject($project: RemoveCvProjectInput!) {
    removeCvProject(project: $project){
        projects {
            id
            project {
                id
                __typename
            }
            name
            domain
            start_date
            end_date
            description
            environment
            responsibilities
        }
    }
}


mutation AddCvProject($project: AddCvProjectInput!) {
    addCvProject(project: $project){
        projects {
            id
        }
    }
}

mutation UpdateCvProject($project:  UpdateCvProjectInput!) {
    updateCvProject(project: $project) {
        projects {
            id
        }
    }
}

mutation ExportPdfCv($pdf:  ExportPdfInput!) {
    exportPdf(pdf: $pdf)
}