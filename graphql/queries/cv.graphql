query GetCvFullName($cvId: ID!) {
    cv(cvId: $cvId) {
        name
    }
}

query GetAllCvs {
    cvs {
        id
        name
        education
        description
        user {
            id
            email
        }
    }
}

query GetCvById($cvId: ID!) {
    cv(cvId: $cvId) {
        name
        education
        description
        projects {
            name
            description
            domain
            start_date
            end_date
            responsibilities
            environment

        }
        skills {
            name
            mastery
            categoryId
        }
    }
}

query GetCvProjects ($cvId: ID!) {
    cv (cvId: $cvId){
        id
        projects {
            project {
                id
                __typename
            }
            id
            name
            domain
            start_date
            end_date
            description
            environment
            responsibilities
        }
    }}

query GetCvSkills($cvId: ID!) {
    cv(cvId: $cvId) {
        id
        user {
            id
        }
        skills {
            name
            categoryId
            mastery
        }
    }
}
